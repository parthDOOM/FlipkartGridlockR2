<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark rounded square -->
  <rect width="32" height="32" rx="7" fill="#07090d"/>
  <!-- hexagon shell — references spatial clustering -->
  <polygon points="16,3 28,10 28,22 16,29 4,22 4,10"
    fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- thin spokes to three alternating vertices (suggest a grid intersection) -->
  <line x1="16" y1="16" x2="28" y2="10" stroke="#38bdf8" stroke-width="0.9" opacity="0.35"/>
  <line x1="16" y1="16" x2="4"  y2="22" stroke="#38bdf8" stroke-width="0.9" opacity="0.35"/>
  <line x1="16" y1="16" x2="16" y2="29" stroke="#38bdf8" stroke-width="0.9" opacity="0.35"/>
  <!-- hotspot glow ring -->
  <circle cx="16" cy="16" r="5.5" fill="#38bdf8" opacity="0.15"/>
  <!-- hotspot core -->
  <circle cx="16" cy="16" r="3.2" fill="#38bdf8"/>
  <!-- bright centre -->
  <circle cx="16" cy="16" r="1.4" fill="#e0f2fe"/>
</svg>
